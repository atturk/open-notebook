services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass password rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always

  open_notebook:
    build: .
    ports:
      - "8502:8502"
      - "5055:5055"
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=secretkey123
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=password
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - PATH=/app/.venv/bin:/usr/local/bin:/usr/bin:/bin
      - VIRTUAL_ENV=/app/.venv
    volumes:
      # Mappiamo solo le cartelle del codice sorgente e dei prompt
      - ./open_notebook:/app/open_notebook
      - ./prompts:/app/prompts
      - ./api:/app/api
      - ./commands:/app/commands
      - ./scripts:/app/scripts
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
      
      # Dati persistenti
      - ./notebook_data:/app/data
      
      # NON mappiamo l'intera cartella /app né la cartella frontend
      # così Docker userà la versione "pronta all'uso" creata nella build
    depends_on:
      - surrealdb
    restart: always